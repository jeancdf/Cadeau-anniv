services:
  - type: web
    name: cadeau-anniv-backend
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    region: frankfurt
    plan: free
    branch: main
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: cadeau-anniv-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: QWEN_API_KEY
        sync: false
      - key: QWEN_MODEL
        value: qwen/qwen3.7-plus
      - key: QWEN_BASE_URL
        value: https://openrouter.ai/api/v1
    autoDeploy: true

databases:
  - name: cadeau-anniv-db
    region: frankfurt
    plan: free 
